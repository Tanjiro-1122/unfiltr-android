name: Build & Submit Android

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build & Submit Android AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: npm install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Write Google Play service account key
        run: echo '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_KEY }}' > google-play-service-account.json

      - name: Build Android AAB (EAS cloud)
        run: eas build --platform android --profile production --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Wait for EAS build then submit
        run: |
          echo "Waiting for EAS build to complete..."
          for i in $(seq 1 50); do
            sleep 30
            STATUS=$(eas build:list --platform android --limit 1 --json --non-interactive 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['status'])" 2>/dev/null || echo "unknown")
            echo "[] Build status: $STATUS"
            if [ "$STATUS" = "FINISHED" ]; then
              echo "Build done! Submitting..."
              eas submit --platform android --profile production --latest --non-interactive
              break
            fi
            if [ "$STATUS" = "ERRORED" ] || [ "$STATUS" = "CANCELED" ]; then
              echo "Build failed: $STATUS"; exit 1
            fi
          done
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
