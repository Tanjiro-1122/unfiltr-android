name: Build & Submit Android

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: ${{ hashFiles('package-lock.json') != '' && 'npm' || '' }}

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Inject RevenueCat Android key as EAS secret
        run: |
          trap 'rm -f /tmp/eas-secrets.env' EXIT INT TERM
          printf 'EXPO_PUBLIC_RC_KEY=%s\n' "$ANDROID_RC_KEY" > /tmp/eas-secrets.env
          eas secret:push --scope project --env-file /tmp/eas-secrets.env --force
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          ANDROID_RC_KEY: ${{ secrets.ANDROID_RC_KEY }}

      - name: Build Android AAB (EAS cloud)
        run: eas build --platform android --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Setup service account for Play Store submission
        run: printf '%s' "$GOOGLE_PLAY_SERVICE_ACCOUNT_KEY" > google-play-service-account.json
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_KEY }}

      - name: Submit to Google Play (internal track)
        run: eas submit --platform android --profile production --latest --non-interactive
        continue-on-error: true
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Cleanup service account JSON
        if: always()
        run: rm -f google-play-service-account.json

      - name: Summary
        run: |
          echo "✅ Android AAB build succeeded"
          echo "📦 Next step: Service account needs Release Manager role in Play Console"
          echo "📧 Service account: revenuecat-service-account@unfiltr-by-javier.iam.gserviceaccount.com"
