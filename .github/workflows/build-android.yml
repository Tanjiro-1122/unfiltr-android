name: Build & Submit Android

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      track:
        description: "Play Store track (internal / alpha / beta / production)"
        required: false
        default: "internal"

jobs:
  build:
    name: Build & Submit Android AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Write Google Play service account key
        run: echo '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_KEY }}' > google-play-service-account.json

      - name: Build Android AAB (EAS cloud)
        run: eas build --platform android --profile production --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Wait for EAS build to finish
        run: |
          echo "Waiting for EAS build..."
          sleep 30
          for i in $(seq 1 40); do
            STATUS=$(eas build:list --platform android --limit 1 --json --non-interactive 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['status'])" 2>/dev/null || echo "unknown")
            echo "Build status: $STATUS"
            if [ "$STATUS" = "FINISHED" ]; then echo "Build complete!"; break; fi
            if [ "$STATUS" = "ERRORED" ] || [ "$STATUS" = "CANCELED" ]; then echo "Build failed: $STATUS"; exit 1; fi
            sleep 30
          done
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Submit to Google Play (internal track)
        run: eas submit --platform android --profile production --latest --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
